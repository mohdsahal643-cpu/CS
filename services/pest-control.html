<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Solutions - Best Security Services in Mumbai</title>
  <link rel="icon" type="image/png" href="/assets/logo/Logo-2048x1468.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-service="pest-control">
  <div class="site-shell">
    <div data-site-header></div>
    <section class="hero" data-service-hero></section>
    <section class="section section-muted service-credibility-section">
      <div class="container service-intro-row">
        <div class="service-intro-content">
          <div class="eyebrow" style="color: var(--steel-blue);">Credibility</div>
          <h2 class="section-title">Built around risk, compliance, and continuity.</h2>
          <div class="service-credibility-copy" data-service-intro></div>
        </div>
        <div class="service-intro-media" data-service-asset></div>
      </div>
    </section>
    <section class="section section-light service-systems-section">
      <div class="container">
        <h2 class="section-title">Operational systems</h2>
        <div class="service-feature-grid" data-service-features></div>
      </div>
    </section>
    <section class="section section-muted service-subservices-section">
      <div class="container">
        <h2 class="section-title">Specialised services</h2>
        <div class="service-subservice-grid" data-service-subservices></div>
      </div>
    </section>
    <section class="section section-dark service-why-section">
      <div class="container service-why-grid">
        <div>
          <div class="eyebrow">Why organisations choose us</div>
          <h2 class="section-title">More than manpower.</h2>
        </div>
        <ul class="service-why-list" data-service-bullets></ul>
      </div>
    </section>
    <section class="section section-light service-closing-section">
      <div class="container"><p data-service-closing></p></div>
    </section>
    <section class="section section-dark service-cta-section">
      <div class="container service-cta-inner">
        <div>
          <div class="eyebrow">Next step</div>
          <h2 class="section-title">Ready to move from vendor to value?</h2>
        </div>
        <div class="btn-row">
          <a class="btn btn-assessment" href="/contact.html#assessment" data-assessment-label></a>
          <a class="btn btn-quote" href="/contact.html#quote">Request a site-specific quote</a>
        </div>
      </div>
    </section>
    <div data-site-footer></div>
  </div>
  <script src="/main.js"></script>
</body>
</html>
